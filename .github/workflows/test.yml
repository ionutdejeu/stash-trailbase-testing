name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stash_test
          POSTGRES_USER: stash
          POSTGRES_PASSWORD: stash
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run User-Level Integration Tests
        env:
          STASH_STORE_DRIVER: postgres
          STASH_STORE_DSN: postgres://stash:stash@localhost:5432/stash_test?sslmode=disable
          STASH_VECTOR_DIM: 1536
          STASH_MAX_RESULT_SIZE: 10000
          STASH_EMBEDDER_DRIVER: openai
          STASH_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STASH_OPENAI_BASE_URL: https://api.openai.com/v1
          STASH_EMBEDDING_MODEL: text-embedding-3-small
          STASH_REASONER_DRIVER: openai
          STASH_REASONER_MODEL: gpt-4o-mini
          STASH_CONTEXT_TTL: 1h
          STASH_HTTP_ADDR: :8080
          STASH_LOG_LEVEL: info
          STASH_LOG_FORMAT: json
        run: |
          # Build binary
          go build -o /tmp/stash ./cmd/cli/
          # Run integration test scripts
          for script in test-phase3-*.sh; do
            echo "Running $script..."
            bash "$script" || exit 1
          done

      - name: Check Code Format
        run: |
          test -z $(go fmt ./...)

      - name: Run Go Vet
        run: |
          go vet ./...

      - name: Build Binary
        run: |
          go build -o /tmp/stash ./cmd/cli/

      - name: Verify Build
        run: |
          /tmp/stash --help
